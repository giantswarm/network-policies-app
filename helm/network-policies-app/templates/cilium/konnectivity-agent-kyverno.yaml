{{- if include "network-policies-app.konnectivityAgent.enabled" . -}}
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-ingress-from-konnectivity
  namespace: kyverno
spec:
  endpointSelector:
    matchLabels:
      # Targets the Kyverno Admission Controller pods
      app.kubernetes.io/component: admission-controller
  ingress:
    - fromEndpoints:
        - matchLabels:
            # Allows traffic from the Konnectivity Agent in kube-system (kamaji)
            "k8s:io.kubernetes.pod.namespace": kube-system
            k8s-app: konnectivity-agent
        - matchLabels:
            # Allows traffic from the Konnectivity Agent in kube-system (AKS)
            "k8s:io.kubernetes.pod.namespace": kube-system
            app: konnectivity-agent
        - matchLabels:
            # Allows traffic from the Konnectivity Agent autoscaler in kube-system (AKS)
            "k8s:io.kubernetes.pod.namespace": kube-system
            app: konnectivity-agent-autoscaler
      toPorts:
        - ports:
            - port: "9443"
---
{{- end }}
